name: Using Reusable Workflow
on:
  push:
    branches:
      - main

jobs:
  # Jobs 1-4 (lint, test, build) are identical to Workflow 1
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Linting..."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Testing..."

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: mkdir -p dist && echo "Build output" > dist/index.html
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

  # ============================================
  # JOB 5: Deploy (Calls Reusable Workflow)
  # ============================================
  deploy:
    needs: build
    # 'uses' calls another workflow file instead of defining steps inline
    # Path is relative to .github/workflows/
    uses: ./.github/workflows/reusable.yml
    
    # Pass inputs defined in the reusable workflow's workflow_call.inputs
    with: 
      artifact-name: dist-files
    
    # Pass secrets if the reusable workflow requires them
    #secrets:
    #  some-secret: ${{ secrets.some-secret }}

  # ============================================
  # JOB 6: Print Deploy Result
  # ============================================
  # Consumes the output returned by the reusable workflow
  print-deploy-result:
    needs: deploy          # Must wait for deploy to finish
    runs-on: ubuntu-latest
    steps:
      - name: Print deploy output
        # Access reusable workflow outputs via: needs.<job-id>.outputs.<output-name>
        # 'result' matches the output name defined in reusable.yml workflow_call.outputs
        run: echo "${{ needs.deploy.outputs.result }}"
    
  # ============================================
  # JOB 7: Report
  # ============================================
  report:
    needs: [lint, test, build, deploy]
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "Something went wrong"
          echo "${{ toJSON(github) }}"