name: Matrix Demo
on: push
jobs:
    build:
        strategy:
            fail-fast: false          # ✅ Optional: don't cancel other jobs if one fails
            matrix:
                node-version: [12, 14, 16]        # ✅ Fixed typo: "verson" → "version"
                operating-system: [ubuntu-latest, windows-latest]
                include:
                    - node-version: 18
                      operating-system: ubuntu-latest  
                exclude:
                    - node-version: 12
                      operating-system: windows-latest  
        runs-on: ${{ matrix.operating-system }}
        steps:
            - name: Get Code
              uses: actions/checkout@v4
            - name: Install nodeJS
              uses: actions/setup-node@v3
              with:
                node-version: ${{ matrix.node-version }}   # ✅ Fixed typo
            - name: Install Dependencies
              run: npm ci
            - name: Build project
              run: npm run build